name: Build Kebabian ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install live-build and syslinux
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap syslinux isolinux
    
    - name: Build Kebabian ISO
      run: |
        mkdir -p kebabian-build
        cd kebabian-build
        
        # Configure with explicit syslinux paths
        lb config \
          --mode debian \
          --distribution bookworm \
          --architecture amd64 \
          --archive-areas "main contrib non-free" \
          --parent-mirror-bootstrap "https://deb.debian.org/debian/" \
          --parent-mirror-chroot "https://deb.debian.org/debian/" \
          --parent-mirror-binary "https://deb.debian.org/debian/" \
          --security false \
          --linux-packages "none" \
          --memtest false \
          --syslinux "/usr/lib/syslinux/modules/bios" \
          --syslinux-timeout 0
        
        # Add packages
        mkdir -p config/package-lists
        cat > config/package-lists/kebabian.list.chroot << 'EOF'
        neofetch
        git
        vim
        htop
        curl
        wget
        sudo
        network-manager
        xfce4
        xfce4-goodies
        lightdm
        EOF
        
        # Hook to add security repo
        mkdir -p config/hooks/normal
        cat > config/hooks/normal/0001-add-security.hook.chroot << 'EOF'
        #!/bin/bash
        echo "deb http://security.debian.org/debian-security bookworm-security main contrib non-free" >> /etc/apt/sources.list
        apt-get update
        EOF
        chmod +x config/hooks/normal/0001-add-security.hook.chroot
        
        # Hook to copy syslinux files to the right place
        mkdir -p config/hooks/normal
        cat > config/hooks/normal/0002-fix-syslinux.hook.chroot << 'EOF'
        #!/bin/bash
        # Create the directories syslinux expects
        mkdir -p /usr/lib/syslinux
        mkdir -p /usr/lib/ISOLINUX
        
        # Copy syslinux files if they exist elsewhere
        if [ -d /usr/lib/syslinux/modules/bios ]; then
          cp /usr/lib/syslinux/modules/bios/*.c32 /usr/lib/syslinux/ 2>/dev/null || true
          cp /usr/lib/syslinux/modules/bios/isolinux.bin /usr/lib/ISOLINUX/ 2>/dev/null || true
        fi
        EOF
        chmod +x config/hooks/normal/0002-fix-syslinux.hook.chroot
        
        sudo lb build --verbose
    
    - name: Upload ISO
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kebabian-iso
        path: kebabian-build/live-image-amd64.hybrid.iso
        if-no-files-found: warn

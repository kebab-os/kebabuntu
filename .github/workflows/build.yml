name: Build Kebabian ISO (Bullseye)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install live-build
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap
    
    - name: Build Kebabian ISO
      run: |
        mkdir -p kebabian-build
        cd kebabian-build
        
        # Use Bullseye - more stable repository URLs
        lb config \
          --mode debian \
          --distribution bullseye \
          --architecture amd64 \
          --archive-areas "main contrib non-free" \
          --debian-installer live \
          --mirror-bootstrap "http://deb.debian.org/debian/" \
          --mirror-chroot "http://deb.debian.org/debian/" \
          --mirror-binary "http://deb.debian.org/debian/"
        
        # Remove security repo via hook (just in case)
        mkdir -p config/hooks/normal
        cat > config/hooks/normal/0000-fix-sources.hook.chroot << 'EOF'
        #!/bin/bash
        # Clean up sources
        echo "deb http://deb.debian.org/debian bullseye main contrib non-free" > /etc/apt/sources.list
        echo "deb http://deb.debian.org/debian bullseye-updates main contrib non-free" >> /etc/apt/sources.list
        apt-get update
        EOF
        chmod +x config/hooks/normal/0000-fix-sources.hook.chroot
        
        # Add packages
        mkdir -p config/package-lists
        cat > config/package-lists/kebabian.list.chroot << 'EOF'
        neofetch
        git
        vim
        htop
        curl
        wget
        sudo
        network-manager
        xfce4
        xfce4-goodies
        lightdm
        EOF
        
        sudo lb build
    
    - name: Upload ISO
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kebabian-iso
        path: kebabian-build/live-image-amd64.hybrid.iso
        if-no-files-found: warn

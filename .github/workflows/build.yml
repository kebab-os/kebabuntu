name: Build Kebabuntu ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Kebabuntu
      run: |
        docker run --privileged --rm -v $(pwd):/workspace -w /workspace ubuntu:jammy bash -c "
          set -e
          
          apt-get update
          apt-get install -y live-build debootstrap
          
          mkdir -p kebabuntu-build
          cd kebabuntu-build
          
          # Debian mode with explicit Ubuntu mirrors
          lb config \
            --mode debian \
            --parent-distribution jammy \
            --distribution jammy \
            --parent-mirror-bootstrap 'http://archive.ubuntu.com/ubuntu/' \
            --mirror-bootstrap 'http://archive.ubuntu.com/ubuntu/' \
            --parent-mirror-binary 'http://archive.ubuntu.com/ubuntu/' \
            --mirror-binary 'http://archive.ubuntu.com/ubuntu/' \
            --parent-mirror-binary-security 'http://security.ubuntu.com/ubuntu/' \
            --mirror-binary-security 'http://security.ubuntu.com/ubuntu/' \
            --architecture amd64 \
            --archive-areas 'main universe multiverse restricted' \
            --parent-archive-areas 'main universe multiverse restricted' \
            --debian-installer false \
            --bootappend-live 'boot=live components quiet splash' \
            --iso-publisher 'Kebabuntu' \
            --iso-volume 'Kebabuntu Live' \
            --iso-application 'Kebabuntu OS'
          
          # Package list
          mkdir -p config/package-lists
          printf '%s\n' \
            'xfce4' \
            'xfce4-goodies' \
            'lightdm' \
            'neofetch' \
            'git' \
            'vim' \
            'htop' \
            'curl' \
            'wget' \
            'sudo' \
            'network-manager' \
            'firefox' \
            > config/package-lists/kebabuntu.list.chroot
          
          lb build --verbose
          
          if [ -f live-image-amd64.hybrid.iso ]; then
            echo '✅ ISO found!'
            cp live-image-amd64.hybrid.iso /workspace/kebabuntu.iso
            chmod 644 /workspace/kebabuntu.iso
          else
            echo '❌ ISO not found!'
            ls -la
            exit 1
          fi
        "
    
    - name: Upload ISO as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kebabuntu-iso
        path: kebabuntu.iso
        if-no-files-found: error

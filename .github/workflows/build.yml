name: Build Kebabuntu ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install live-build and GRUB
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap grub-pc-bin grub-efi-amd64-bin
    
    - name: Build Kebabuntu ISO
      run: |
        mkdir -p kebabuntu-build
        cd kebabuntu-build
        
        # Kebabuntu with GRUB bootloader
        lb config \
          --distribution jammy \
          --architecture amd64 \
          --archive-areas "main universe multiverse restricted" \
          --debian-installer false \
          --bootappend-live "boot=live components quiet splash" \
          --iso-publisher "Kebabuntu" \
          --iso-volume "Kebabuntu Live" \
          --iso-application "Kebabuntu OS" \
          --bootloader "grub"
        
        # Add packages
        mkdir -p config/package-lists
        cat > config/package-lists/kebabuntu.list.chroot << 'EOF'
        neofetch
        git
        vim
        htop
        curl
        wget
        sudo
        network-manager
        xubuntu-desktop
        lightdm
        EOF
        
        sudo lb build
    
    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        files: kebabuntu-build/live-image-amd64.hybrid.iso
        tag_name: latest
        name: "Kebabuntu Latest Build"
        body: |
          ## 🥙 Kebabuntu
          
          ### What's included:
          - Xubuntu Desktop (XFCE)
          - neofetch, git, vim, htop
          - NetworkManager
          - GRUB bootloader
          
          ### How to use:
          1. Download the ISO
          2. Create a bootable USB with Rufus
          3. Boot and enjoy!
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload ISO as Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kebabuntu-iso
        path: kebabuntu-build/live-image-amd64.hybrid.iso
        if-no-files-found: warn

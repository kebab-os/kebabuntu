name: Build Kebabian ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install live-build and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          live-build \
          debootstrap \
          squashfs-tools \
          xorriso \
          isolinux \
          syslinux-utils \
          mtools \
          dosfstools \
          grub-pc-bin \
          grub-efi-amd64-bin \
          grub-common
    
    - name: Build Kebabian ISO
      run: |
        mkdir -p kebabian-build
        cd kebabian-build
        
        # CRITICAL: --mode debian forces Debian repositories
        lb config \
          --mode debian \
          --distribution bookworm \
          --architecture amd64 \
          --archive-areas "main contrib non-free" \
          --debian-installer live \
          --bootappend-live "boot=live components quiet splash" \
          --iso-publisher "Kebabian" \
          --iso-volume "Kebabian Live" \
          --iso-application "Kebabian OS" \
          --mirror-bootstrap "http://deb.debian.org/debian/" \
          --mirror-chroot "http://deb.debian.org/debian/" \
          --mirror-binary "http://deb.debian.org/debian/" \
          --mirror-debian-installer "http://deb.debian.org/debian/"
        
        # Add packages
        mkdir -p config/package-lists
        cat > config/package-lists/kebabian.list.chroot << 'EOF'
        neofetch
        git
        vim
        htop
        curl
        wget
        sudo
        network-manager
        xfce4
        xfce4-goodies
        lightdm
        EOF
        
        # Build it!
        sudo lb build
    
    - name: Upload ISO
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kebabian-iso
        path: kebabian-build/live-image-amd64.hybrid.iso
        if-no-files-found: warn

name: Build Kebabuntu ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Kebabuntu inside Docker
      run: |
        docker run --rm -v $(pwd):/workspace -w /workspace ubuntu:jammy bash -c "
          set -e
          
          apt-get update
          apt-get install -y live-build debootstrap grub-pc-bin grub-efi-amd64-bin \
                             squashfs-tools xorriso isolinux syslinux-utils \
                             mtools dosfstools curl wget git vim
          
          mkdir -p kebabuntu-build
          cd kebabuntu-build
          
          lb config \
            --distribution jammy \
            --architecture amd64 \
            --archive-areas 'main universe multiverse restricted' \
            --debian-installer false \
            --bootappend-live 'boot=live components quiet splash' \
            --iso-publisher 'Kebabuntu' \
            --iso-volume 'Kebabuntu Live' \
            --iso-application 'Kebabuntu OS'
          
          mkdir -p config/package-lists
          cat > config/package-lists/kebabuntu.list.chroot << 'EOF'
          xfce4
          xfce4-goodies
          lightdm
          neofetch
          git
          vim
          htop
          curl
          wget
          sudo
          network-manager
          firefox
          EOF
          
          # Build with VERBOSE output to see what's happening
          lb build --verbose
          
          # List all files after build
          echo "=== Files in kebabuntu-build after build ==="
          ls -la
          find . -name "*.iso" -ls || echo "No ISO found"
          
          # Check if ISO exists and copy it
          if [ -f live-image-amd64.hybrid.iso ]; then
            echo "✅ ISO found inside container!"
            ls -la live-image-amd64.hybrid.iso
            cp live-image-amd64.hybrid.iso /workspace/kebabuntu.iso
            chmod 644 /workspace/kebabuntu.iso
          else
            echo "❌ ISO not found inside container!"
            echo "=== Searching for any ISO files ==="
            find . -name "*.iso" -ls 2>/dev/null || echo "No ISO found anywhere"
            echo "=== Build log may show errors above ==="
            exit 1
          fi
        "
    
    - name: Check for ISO
      run: |
        echo "=== Checking workspace ==="
        ls -la
        if [ -f kebabuntu.iso ]; then
          echo "✅ ISO found!"
          ls -lh kebabuntu.iso
        else
          echo "❌ ISO not found!"
          # Check inside kebabuntu-build
          if [ -d kebabuntu-build ]; then
            echo "=== Contents of kebabuntu-build ==="
            ls -la kebabuntu-build/
            find kebabuntu-build -name "*.iso" -ls || echo "No ISO in kebabuntu-build"
          fi
          exit 1
        fi
    
    - name: Upload ISO as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kebabuntu-iso
        path: kebabuntu.iso
        if-no-files-found: error

name: Build Kebabian ISO (Quick)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install live-build
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap
    
    - name: Build Kebabian ISO
      run: |
        mkdir -p kebabian-build
        cd kebabian-build
        
        # Minimal config without security updates
        lb config \
          --distribution bookworm \
          --architecture amd64 \
          --archive-areas "main contrib non-free" \
          --mirror-bootstrap "http://deb.debian.org/debian/" \
          --mirror-chroot "http://deb.debian.org/debian/" \
          --mirror-binary "http://deb.debian.org/debian/"
        
        # Add packages
        mkdir -p config/package-lists
        echo "neofetch" > config/package-lists/kebabian.list.chroot
        
        sudo lb build
    
    - name: Upload ISO
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kebabian-iso
        path: kebabian-build/live-image-amd64.hybrid.iso
        if-no-files-found: warn

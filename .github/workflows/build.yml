name: Build Kebabuntu ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install live-build
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap
    
    - name: Build Kebabuntu ISO
      run: |
        mkdir -p kebabuntu-build
        cd kebabuntu-build
        
        # Kebabuntu - Ubuntu-based, NO installer
        lb config \
          --distribution jammy \
          --architecture amd64 \
          --archive-areas "main universe multiverse restricted" \
          --debian-installer false \
          --bootappend-live "boot=live components quiet splash" \
          --iso-publisher "Kebabuntu" \
          --iso-volume "Kebabuntu Live" \
          --iso-application "Kebabuntu OS"
        
        # Add packages
        mkdir -p config/package-lists
        cat > config/package-lists/kebabuntu.list.chroot << 'EOF'
        neofetch
        git
        vim
        htop
        curl
        wget
        sudo
        network-manager
        xubuntu-desktop
        lightdm
        EOF
        
        sudo lb build
    
    - name: Upload ISO
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kebabuntu-iso
        path: kebabuntu-build/live-image-amd64.hybrid.iso
        if-no-files-found: warn

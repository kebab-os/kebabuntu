name: Build Kebabuntu ISO (manual, no live-build)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Kebabuntu manually
      run: |
        docker run --privileged --rm -v $(pwd):/workspace -w /workspace ubuntu:jammy bash -c "
          set -e
          
          apt-get update
          apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-efi-amd64-bin mtools isolinux syslinux
          
          # 1. Bootstrap a minimal Ubuntu system
          mkdir -p /workspace/live-system/chroot
          debootstrap --arch=amd64 --components=main,universe,multiverse,restricted \
            jammy /workspace/live-system/chroot http://archive.ubuntu.com/ubuntu/
          
          # 2. Mount virtual filesystems
          mount --bind /dev /workspace/live-system/chroot/dev
          mount --bind /dev/pts /workspace/live-system/chroot/dev/pts
          mount -t proc proc /workspace/live-system/chroot/proc
          mount -t sysfs sys /workspace/live-system/chroot/sys
          
          # 3. Set up Ubuntu repositories inside chroot (no heredoc)
          printf '%s\n' \
            'deb http://archive.ubuntu.com/ubuntu jammy main universe multiverse restricted' \
            'deb http://archive.ubuntu.com/ubuntu jammy-updates main universe multiverse restricted' \
            'deb http://security.ubuntu.com/ubuntu jammy-security main universe multiverse restricted' \
            > /workspace/live-system/chroot/etc/apt/sources.list
          
          chroot /workspace/live-system/chroot apt-get update
          chroot /workspace/live-system/chroot apt-get install -y \
            xfce4 xfce4-goodies lightdm lightdm-gtk-greeter \
            neofetch git vim htop curl wget sudo \
            network-manager firefox \
            linux-image-generic casper lupin-casper \
            grub-efi-amd64-bin grub-pc-bin
          
          # 4. Clean up
          chroot /workspace/live-system/chroot apt-get clean
          rm -rf /workspace/live-system/chroot/var/lib/apt/lists/*
          
          # 5. Prepare live system files
          mkdir -p /workspace/live-system/image/{casper,boot/grub}
          
          # Copy kernel and initrd
          cp /workspace/live-system/chroot/boot/vmlinuz-*-generic /workspace/live-system/image/casper/vmlinuz
          cp /workspace/live-system/chroot/boot/initrd.img-*-generic /workspace/live-system/image/casper/initrd
          
          # Create squashfs (excluding boot to avoid duplication)
          mksquashfs /workspace/live-system/chroot /workspace/live-system/image/casper/filesystem.squashfs -comp xz -e boot
          
          # Write filesystem.size
          printf \$(du -sx --block-size=1 /workspace/live-system/chroot | cut -f1) > /workspace/live-system/image/casper/filesystem.size
          
          # 6. GRUB2 boot setup
          cp /usr/lib/grub/i386-pc/cdboot.img /workspace/live-system/image/boot/grub/
          printf 'set timeout=10\nset default=0\n\nmenuentry \"Kebabuntu Live\" {\n    linux /casper/vmlinuz boot=casper quiet splash ---\n    initrd /casper/initrd\n}\n\nmenuentry \"Kebabuntu Live (safe graphics)\" {\n    linux /casper/vmlinuz boot=casper nomodeset quiet splash ---\n    initrd /casper/initrd\n}\n' > /workspace/live-system/image/boot/grub/grub.cfg
          
          # 7. Unmount chroot filesystems
          umount -lf /workspace/live-system/chroot/proc
          umount -lf /workspace/live-system/chroot/sys
          umount -lf /workspace/live-system/chroot/dev/pts
          umount -lf /workspace/live-system/chroot/dev
          
          # 8. Create hybrid ISO with xorriso
          xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -volid 'Kebabuntu Live' \
            -publisher Kebabuntu \
            -appid 'Kebabuntu OS' \
            -eltorito-boot boot/grub/cdboot.img \
            -eltorito-catalog boot/grub/boot.cat \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            -isohybrid-gpt-basdat \
            -output /workspace/kebabuntu.iso \
            /workspace/live-system/image
          
          echo '✅ ISO created!'
        "
    
    - name: Upload ISO as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kebabuntu-iso
        path: kebabuntu.iso
        if-no-files-found: error

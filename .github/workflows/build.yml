name: Build Kebabuntu ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Kebabuntu inside Docker (Privileged)
      run: |
        docker run --privileged --rm -v $(pwd):/workspace -w /workspace ubuntu:jammy bash -c "
          set -e
          
          apt-get update
          apt-get install -y live-build debootstrap grub-pc-bin grub-efi-amd64-bin \
                             squashfs-tools xorriso isolinux syslinux syslinux-utils \
                             mtools dosfstools curl wget git vim
          
          mkdir -p kebabuntu-build
          cd kebabuntu-build
          
          # Basic configuration
          lb config \
            --mode ubuntu \
            --distribution jammy \
            --architecture amd64 \
            --archive-areas 'main universe multiverse restricted' \
            --debian-installer false \
            --bootappend-live 'boot=live components quiet splash' \
            --iso-publisher 'Kebabuntu' \
            --iso-volume 'Kebabuntu Live' \
            --iso-application 'Kebabuntu OS' \
            --bootloader 'grub'
          
          mkdir -p config/package-lists
          echo 'xfce4' > config/package-lists/kebabuntu.list.chroot
          echo 'xfce4-goodies' >> config/package-lists/kebabuntu.list.chroot
          echo 'lightdm' >> config/package-lists/kebabuntu.list.chroot
          echo 'neofetch' >> config/package-lists/kebabuntu.list.chroot
          echo 'git' >> config/package-lists/kebabuntu.list.chroot
          echo 'vim' >> config/package-lists/kebabuntu.list.chroot
          echo 'htop' >> config/package-lists/kebabuntu.list.chroot
          echo 'curl' >> config/package-lists/kebabuntu.list.chroot
          echo 'wget' >> config/package-lists/kebabuntu.list.chroot
          echo 'sudo' >> config/package-lists/kebabuntu.list.chroot
          echo 'network-manager' >> config/package-lists/kebabuntu.list.chroot
          echo 'firefox' >> config/package-lists/kebabuntu.list.chroot
          
          rm -rf config/bootloaders/isolinux 2>/dev/null || true
          
          # ===== PATCH binary_grub scripts =====
          find /usr/lib/live/build /usr/share/live/build -type f -name '*binary_grub*' \
            -exec sed -i '/grub-legacy/d; /stage2_eltorito/d' {} \;
          
          # ===== Override binary_iso with a custom version =====
          mkdir -p config/hooks/render
          cat > config/hooks/render/binary_iso.hook.chroot << 'ISOEOF'
          #!/bin/sh
          echo \"Custom binary_iso override for Kebabuntu\"
          # Use xorriso directly for hybrid ISO creation
          xorriso -as mkisofs -iso-level 3 -full-iso9660-filenames -volid \"Kebabuntu Live\" -publisher Kebabuntu -appid \"Kebabuntu OS\" -eltorito-boot boot/grub/cdboot.img -eltorito-catalog boot/grub/boot.cat -no-emul-boot -boot-load-size 4 -boot-info-table -isohybrid-gpt-basdat -output binary.hybrid.iso binary
          mv binary.hybrid.iso live-image-amd64.hybrid.iso
          ISOEOF
          chmod +x config/hooks/render/binary_iso.hook.chroot
          
          # ===== Create boot preparation hook =====
          mkdir -p config/hooks/normal
          cat > config/hooks/normal/0900-prepare-boot.hook.chroot << 'HOOKEOF'
          #!/bin/sh
          echo \"Preparing GRUB boot files...\"
          mkdir -p /boot/grub
          if [ -f /usr/lib/grub/i386-pc/cdboot.img ]; then
            cp /usr/lib/grub/i386-pc/cdboot.img /boot/grub/cdboot.img
          fi
          if [ ! -f /boot/grub/grub.cfg ]; then
            cat > /boot/grub/grub.cfg << 'GRUBCFG'
          set timeout=10
          set default=0
          menuentry \"Kebabuntu Live\" {
              linux /casper/vmlinuz boot=casper quiet splash ---
              initrd /casper/initrd
          }
          menuentry \"Kebabuntu Live (safe graphics)\" {
              linux /casper/vmlinuz boot=casper nomodeset quiet splash ---
              initrd /casper/initrd
          }
          GRUBCFG
          fi
          HOOKEOF
          chmod +x config/hooks/normal/0900-prepare-boot.hook.chroot
          
          # Disable memtest and syslinux
          export LB_MEMTEST='false'
          export LB_BOOTLOADER_SYSLINUX='false'
          export LB_BOOTLOADER_GRUB_LEGACY='false'
          
          lb build --verbose
          
          if [ -f live-image-amd64.hybrid.iso ]; then
            echo '✅ ISO found!'
            cp live-image-amd64.hybrid.iso /workspace/kebabuntu.iso
            chmod 644 /workspace/kebabuntu.iso
          else
            echo '❌ ISO not found!'
            ls -la
            exit 1
          fi
        "
    
    - name: Upload ISO as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kebabuntu-iso
        path: kebabuntu.iso
        if-no-files-found: error

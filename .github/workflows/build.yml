name: Build Kebabuntu ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build Kebabuntu inside Docker
      run: |
        docker run --rm -v $(pwd):/workspace -w /workspace ubuntu:jammy bash -c "
          set -e
          
          apt-get update
          apt-get install -y live-build debootstrap grub-pc-bin grub-efi-amd64-bin \
                             squashfs-tools xorriso isolinux syslinux-utils \
                             mtools dosfstools curl wget git vim
          
          mkdir -p kebabuntu-build
          cd kebabuntu-build
          
          lb config \
            --distribution jammy \
            --architecture amd64 \
            --archive-areas 'main universe multiverse restricted' \
            --debian-installer false \
            --bootappend-live 'boot=live components quiet splash' \
            --iso-publisher 'Kebabuntu' \
            --iso-volume 'Kebabuntu Live' \
            --iso-application 'Kebabuntu OS'
          
          mkdir -p config/package-lists
          cat > config/package-lists/kebabuntu.list.chroot << 'EOF'
          xfce4
          xfce4-goodies
          lightdm
          neofetch
          git
          vim
          htop
          curl
          wget
          sudo
          network-manager
          firefox
          EOF
          
          lb build
          
          # Copy ISO to the workspace root
          if [ -f live-image-amd64.hybrid.iso ]; then
            echo "✅ ISO found, copying to workspace..."
            cp live-image-amd64.hybrid.iso /workspace/kebabuntu.iso
          else
            echo "❌ ISO not found!"
            ls -la
            exit 1
          fi
        "
    
    - name: Verify ISO exists
      run: |
        echo "=== Files in workspace ==="
        ls -la
        if [ -f kebabuntu.iso ]; then
          echo "✅ ISO found! Size: $(ls -lh kebabuntu.iso | awk '{print $5}')"
        else
          echo "❌ ISO NOT found in workspace!"
          echo "Searching for ISO..."
          find . -name "*.iso" -ls || echo "No ISO anywhere!"
          exit 1
        fi
    
    - name: Upload ISO as Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kebabuntu-iso
        path: kebabuntu.iso
        if-no-files-found: error

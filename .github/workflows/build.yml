name: Build Kebabian ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap squashfs-tools xorriso isolinux syslinux-utils
        sudo apt-get install -y --no-install-recommends live-build
    
    - name: Configure and build
      run: |
        mkdir -p kebabian-build
        cd kebabian-build
        lb config \
          --distribution bookworm \
          --architecture amd64 \
          --archive-areas "main contrib non-free"
        
        # Add packages
        echo "neofetch" >> config/package-lists/kebabian.list.chroot
        
        # Build
        sudo lb build
    
    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: kebabian-iso
        path: kebabian-build/live-image-amd64.hybrid.iso

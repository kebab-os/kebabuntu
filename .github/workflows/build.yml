name: Build Kebabian ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install live-build
      run: |
        sudo apt-get update
        sudo apt-get install -y live-build debootstrap
    
    - name: Build Kebabian ISO
      run: |
        mkdir -p kebabian-build
        cd kebabian-build
        
        # Configure with EXPLICIT and CORRECT mirror paths
        lb config \
          --mode debian \
          --distribution bookworm \
          --architecture amd64 \
          --archive-areas "main contrib non-free" \
          --mirror-bootstrap "http://deb.debian.org/debian/" \
          --mirror-chroot "http://deb.debian.org/debian/" \
          --mirror-binary "http://deb.debian.org/debian/" \
          --mirror-chroot-security "http://security.debian.org/debian-security" \
          --mirror-binary-security "http://security.debian.org/debian-security"
        
        # Add packages
        mkdir -p config/package-lists
        cat > config/package-lists/kebabian.list.chroot << 'EOF'
        neofetch
        git
        vim
        htop
        curl
        wget
        sudo
        network-manager
        xfce4
        xfce4-goodies
        lightdm
        EOF
        
        sudo lb build
    
    - name: Upload ISO
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: kebabian-iso
        path: kebabian-build/live-image-amd64.hybrid.iso
        if-no-files-found: warn
